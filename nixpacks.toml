[phases.setup]
nixPkgs = ["php84", "php84Extensions.bcmath", "php84Extensions.mbstring", "php84Extensions.xml", "php84Extensions.curl", "php84Extensions.pdo", "php84Extensions.pdo_mysql", "php84Extensions.tokenizer", "php84Extensions.fileinfo", "php84Extensions.openssl", "php84Extensions.zip", "php84Extensions.sodium", "composer"]

[phases.build]
cmds = [
  "composer install --optimize-autoloader --no-dev --no-interaction",
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"
